# Stack for Portainer + GitHub Actions:
# - GitHub workflow ".github/workflows/build-and-notify-portainer.yml" pushes a fresh image on each push to main.
# - Replace the image line if you forked the repo (ghcr.io/<owner>/<repo>:latest).
# - In GitHub: Packages → mcp-proxy-server → Package settings → set visibility to Public
#   (or configure Portainer with a GHCR read token to pull private images).
# - Repository secret PORTAINER_STACK_WEBHOOK_URL = Portainer stack webhook URL.

services:
  mcp-proxy:
    image: ghcr.io/holger81/mcp-proxy-server:latest
    pull_policy: always
    ports:
      - "2222:8080"
    volumes:
      - mcp-proxy-data:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      MCP_PROXY_DATA_DIR: /data
      MCP_PROXY_STATIC_ROOT: /app/static
      MCP_PROXY_ADMIN_PASSWORD: ${MCP_PROXY_ADMIN_PASSWORD:-}
      MCP_PROXY_SESSION_SECRET: ${MCP_PROXY_SESSION_SECRET:-}
      MCP_PROXY_SECURE_COOKIES: ${MCP_PROXY_SECURE_COOKIES:-false}
      MCP_PROXY_ADMIN_PASSWORD_FILE: ${MCP_PROXY_ADMIN_PASSWORD_FILE:-}
      MCP_PROXY_SESSION_SECRET_FILE: ${MCP_PROXY_SESSION_SECRET_FILE:-}
      TZ: ${TZ:-}
    restart: unless-stopped

volumes:
  mcp-proxy-data:
