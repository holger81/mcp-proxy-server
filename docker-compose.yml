# Local dev / Portainer with build:. — CI can SSH to this clone and run compose build (see .github/workflows/deploy.yml).
services:
  mcp-proxy:
    build: .
    # Local tag only — not on Docker Hub. Prevents `compose pull` / Portainer “Pull” from hitting the registry.
    image: mcp-proxy:latest
    pull_policy: never
    ports:
      - "2222:8080"
    volumes:
      - mcp-proxy-data:/data
      # Match container log timestamps to the host clock (same pattern as Frigate / other stacks).
      - /etc/localtime:/etc/localtime:ro
    environment:
      MCP_PROXY_DATA_DIR: /data
      MCP_PROXY_STATIC_ROOT: /app/static
      # Pass stack / .env values into the container (Portainer “Environment” only applies if referenced here).
      MCP_PROXY_ADMIN_PASSWORD: ${MCP_PROXY_ADMIN_PASSWORD:-}
      MCP_PROXY_SESSION_SECRET: ${MCP_PROXY_SESSION_SECRET:-}
      MCP_PROXY_SECURE_COOKIES: ${MCP_PROXY_SECURE_COOKIES:-false}
      MCP_PROXY_ADMIN_PASSWORD_FILE: ${MCP_PROXY_ADMIN_PASSWORD_FILE:-}
      MCP_PROXY_SESSION_SECRET_FILE: ${MCP_PROXY_SESSION_SECRET_FILE:-}
      # Optional in .env: TZ=America/Denver (IANA). Uses zoneinfo for log timestamps; combine with localtime mount above.
      TZ: ${TZ:-}
      # --- Optional LLM context caps (0 = unlimited for *_MAX_CHARS) ---
      # MCP_PROXY_TOOL_SEARCH_MAX_MATCHES: "25"
      # MCP_PROXY_TOOL_DOMAIN_DEFAULT_LIMIT: "20"
      # MCP_PROXY_TOOL_DOMAIN_MAX_LIMIT: "100"
      # MCP_PROXY_TOOL_DESCRIPTION_MAX_CHARS: "0"
      # MCP_PROXY_TOOL_SERVER_LLM_CONTEXT_MAX_CHARS: "0"
      # MCP_PROXY_TOOL_INPUT_SCHEMA_MAX_CHARS: "0"
      # MCP_PROXY_CALL_TOOL_RESPONSE_TEXT_MAX_CHARS: "0"
      # MCP_PROXY_TOOL_DISCOVERY_COMPACT_JSON: "false"
      # MCP_PROXY_INSTRUCTIONS_MAX_CHARS: "0"
    restart: unless-stopped

volumes:
  mcp-proxy-data:
