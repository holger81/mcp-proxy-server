services:
  mcp-proxy:
    build: .
    # Local tag only — not on Docker Hub. Prevents `compose pull` / Portainer “Pull” from hitting the registry.
    image: mcp-proxy:latest
    pull_policy: never
    ports:
      - "2222:8080"
    volumes:
      - mcp-proxy-data:/data
    environment:
      MCP_PROXY_DATA_DIR: /data
      MCP_PROXY_STATIC_ROOT: /app/static
      # Optional: set a strong admin password and a random session secret (≥16 chars), OR use *_FILE
      # pointing at Docker secret files (e.g. /run/secrets/...). On startup, logs show whether auth is enabled.
      # MCP_PROXY_ADMIN_PASSWORD: "change-me"
      # MCP_PROXY_SESSION_SECRET: "use-a-long-random-string"
      # MCP_PROXY_ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      # MCP_PROXY_SESSION_SECRET_FILE: /run/secrets/session_secret
      # Behind HTTPS, set MCP_PROXY_SECURE_COOKIES: "true"
    restart: unless-stopped

volumes:
  mcp-proxy-data:
