# No SSH and no container registry required when Portainer runs the stack from Git.
#
# Setup (Portainer):
# 1. Stacks → Add stack → Repository (not "Web editor").
# 2. Repository URL: this GitHub repo; Reference: main; Compose path: docker-compose.yml
# 3. If Portainer asks, enable pulling latest on redeploy / rebuilding images (wording varies by version).
# 4. Stack → Webhooks → copy URL → GitHub repo → Settings → Secrets → PORTAINER_STACK_WEBHOOK_URL
#
# On each push to main, this workflow POSTs the webhook. Portainer pulls the new commit on the
# host and reapplies the stack (including `docker compose build` when your compose uses `build: .`).
#
# If redeploy does not rebuild, check Portainer docs for your version ("Rebuild image", Git pull, etc.).

name: Deploy (Portainer webhook)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer stack redeploy
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_STACK_WEBHOOK_URL }}
        run: |
          if [ -n "${WEBHOOK_URL}" ]; then
            curl -fsS -m 120 -X POST "${WEBHOOK_URL}"
          else
            echo "::notice::Add repository secret PORTAINER_STACK_WEBHOOK_URL (Portainer stack webhook). See workflow file comments for Git-based stack setup."
          fi
